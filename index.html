<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <section>
        <div class="section-container">
            <div class="card-container">
                <div class="card-content">
                    <div class="qr-code">
                        <img class="qr-image" src="/images/image-qr-code.png" alt="Image of the QR code.">
                    </div>
                    <div class="text-content">
                        <h1 id="title-txt">Improve your front-end skills by builing projects</h1>
                        <p id="description-txt">Scan the QR code to visit Frontend Mentor and take your coding skills
                            to
                            the next level</p>
                    </div>


                </div>
            </div>
        </div>
    </section>
</body>

</html>
